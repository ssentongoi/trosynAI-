<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trosyn AI - Page Not Found</title>
<meta name="description" content="The page you requested was not found. Return to Trosyn AI home, join the waitlist, or contact the team."/>
<meta name="theme-color" content="#006054"/>
<link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml"/>
<link rel="shortcut icon" href="assets/images/favicon.svg" type="image/svg+xml"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,900;1,300;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#006054;--navy:#14283C;--coral:#DC503C;--gold:#F0B464;
  --teal-lt:#DCF0F0;--teal-md:#3C6464;--white:#F0F0F0;--pure:#FFFFFF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--green);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:400;line-height:1.7;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.35;}
.topo{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.05;background-image:repeating-radial-gradient(ellipse at 20% 50%,transparent 0,transparent 40px,#DCF0F0 41px,transparent 42px),repeating-radial-gradient(ellipse at 80% 20%,transparent 0,transparent 60px,#DCF0F0 61px,transparent 62px);}
.container{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 28px;}

nav{position:sticky;top:0;z-index:100;background:rgba(0,96,84,0.88);backdrop-filter:blur(14px) saturate(118%);-webkit-backdrop-filter:blur(14px) saturate(118%);border-bottom:1px solid rgba(220,240,240,0.2);box-shadow:0 4px 10px rgba(12,42,40,0.12),inset 0 1px 0 rgba(255,255,255,0.18);padding:0 28px;overflow:hidden;}
nav::before{content:'';position:absolute;top:-45%;left:-32%;width:36%;height:190%;background:linear-gradient(115deg,rgba(255,255,255,0) 0%,rgba(255,255,255,0.16) 48%,rgba(255,255,255,0.05) 62%,rgba(255,255,255,0) 100%);pointer-events:none;transform:translateX(0) rotate(8deg);animation:navGlossSweep 7.6s ease-in-out infinite;}
nav::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(to bottom,rgba(255,255,255,0.1),rgba(255,255,255,0) 34%);}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:68px;}
.nav-logo{display:inline-flex;align-items:center;gap:9px;text-decoration:none;color:var(--pure);white-space:nowrap;}
.nav-logo-wordmark{display:inline-flex;align-items:baseline;gap:3px;font-size:1.45rem;font-weight:600;letter-spacing:-0.055em;line-height:1;color:var(--pure);}
.nav-logo-ai{font-weight:500;letter-spacing:-0.065em;opacity:0.94;}

.page{padding:84px 0 104px;}
.error-shell{max-width:760px;margin:0 auto;background:linear-gradient(145deg,rgba(20,40,60,0.44) 0%,rgba(10,37,34,0.52) 100%);border:1px solid rgba(220,240,240,0.14);border-radius:20px;padding:clamp(28px,5vw,48px);box-shadow:0 16px 34px rgba(6,30,28,0.28);}
.error-code{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;border:1px solid rgba(240,180,100,0.28);background:rgba(240,180,100,0.1);color:var(--gold);font-size:0.72rem;font-weight:700;letter-spacing:0.11em;text-transform:uppercase;margin-bottom:18px;}
.error-title{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(2.2rem,6vw,4.2rem);line-height:0.98;letter-spacing:-0.03em;color:var(--pure);margin-bottom:14px;}
.error-sub{font-size:1rem;color:rgba(228,246,242,0.92);max-width:56ch;line-height:1.72;margin-bottom:28px;}
.actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border-radius:6px;padding:12px 20px;font-size:0.9rem;font-weight:700;letter-spacing:0.01em;transition:background 0.2s,transform 0.2s,border-color 0.2s,color 0.2s;}
.btn-primary{background:#e05a3a;color:#ffffff;}
.btn-primary:hover{background:#c44030;transform:translateY(-1px);}
.btn-secondary{background:rgba(220,240,240,0.08);border:1px solid rgba(220,240,240,0.22);color:var(--pure);}
.btn-secondary:hover{background:rgba(220,240,240,0.14);border-color:rgba(220,240,240,0.35);}
.btn-link{color:var(--teal-lt);padding:12px 6px;border-bottom:1px solid rgba(220,240,240,0.25);border-radius:0;font-weight:600;}
.btn-link:hover{color:var(--pure);border-bottom-color:rgba(220,240,240,0.55);}
.error-context{font-size:0.84rem;color:rgba(220,240,240,0.74);line-height:1.65;}

@media(max-width:640px){
  .page{padding:64px 0 84px;}
  .actions{flex-direction:column;align-items:stretch;}
  .btn{width:100%;}
  .btn-link{text-align:center;}
}
 navGlossSweep{
  0%{transform:translateX(0) rotate(8deg);opacity:.08;}
  20%{opacity:.3;}
  50%{transform:translateX(310%) rotate(8deg);opacity:.22;}
  100%{transform:translateX(305%) rotate(8deg);opacity:0;}
}

 (prefers-reduced-motion: reduce){
  nav::before{animation:none;opacity:.22;}
}
</style>

<script defer src="lib/consent/consentManager.js"></script>
<script defer src="lib/analytics/clarityLoader.js"></script>
<script defer src="components/ConsentBanner.js"></script>
</head>
<body>
<div class="topo"></div>
<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html" aria-label="Trosyn AI home">
      <span class="nav-logo-wordmark"><span>trosyn</span><span class="nav-logo-ai">AI</span></span>
    </a>
  </div>
</nav>

<main class="page">
  <div class="container">
    <section class="error-shell" aria-labelledby="error-title">
      <p class="error-code">404 Error</p>
      <h1 id="error-title" class="error-title">Page Not Found</h1>
      <p class="error-sub">The page you are looking for does not exist or may have been moved.</p>
      <div class="actions">
        <a class="btn btn-primary" href="index.html">Go to Home</a>
        <a class="btn btn-secondary" href="waitlist.html">Join the Waitlist</a>
        <a class="btn btn-link" href="contact.html">Contact Us</a>
      </div>
      <p class="error-context">You can return to the homepage or request access to Trosyn AI.</p>
    </section>
  </div>
</main>
</body>
</html>
